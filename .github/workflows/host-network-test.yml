      name: Sming Host Build and Network Test

      on:
        workflow_dispatch:
        push:
          branches: [ feature/host ]
        pull_request:
          branches: [ feature/host ]

      jobs:
        build-and-test-host:
          runs-on: ubuntu-latest
          steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Install dependencies
              run: |
                sudo apt-get update
                sudo apt-get install -y build-essential cmake ninja-build python3 iproute2 curl

            - name: Download fileList.h artifact
              run: |
                WEBAPP_BRANCH=devel
                if [ -f ./include/fileList.h ]; then
                  echo "removing fileList.h"
                  rm ./include/fileList.h
                fi
                artifact_url="https://pljakobs.github.io/esp_rgb_webapp2/${WEBAPP_BRANCH}/fileList.h"
                echo "Downloading fileList.h from: $artifact_url"
                curl -L -o fileList.h "$artifact_url"
                mv fileList.h ./include

            - name: Download webapp files artifact
              run: |
                WEBAPP_BRANCH=devel
                if [ -d ./webapp ]; then
                  echo "removing and re-creating webapp directory"
                  rm -rf ./webapp
                  mkdir ./webapp
                fi
                artifact_url="https://pljakobs.github.io/esp_rgb_webapp2/${WEBAPP_BRANCH}/spa-files.zip"
                echo "Downloading webapp files from: $artifact_url"
                curl -L -o spa-files.zip "$artifact_url"
                unzip spa-files.zip -d ./webapp
                mv ./webapp/dist/spa/* ./webapp
                rm -rf ./webapp/dist/spa
                echo "webapp files version"
                cat ./webapp/VERSION

            - name: Ensure tun module is loaded
              run: sudo modprobe tun

            - name: Set up tap device
              run: |
                sudo ip tuntap add dev tap0 mode tap
                sudo ip link set tap0 up
                sudo ip addr add 10.0.0.1/24 dev tap0


            - name: Build Sming and application for Host (Docker)
              run: |
                docker run --rm --privileged -v $GITHUB_WORKSPACE:/workspace -w /workspace \
                  docker.io/pjakobs/sming:latest \
                  bash -c "git config --global --add safe.directory /workspace && \
                  source /opt/Sming/Tools/export.sh && \
                  make PLATFORM=Host"

            - name: Run application in background
              run: |
                cd out/Host/build
                ./$(ls | grep -m1 -v '\.o$') &
                sleep 5

            - name: Check if port 80 is reachable
              run: |
                curl --fail --max-time 5 http://127.0.0.1:80 || (echo 'Port 80 not reachable' && exit 1)
